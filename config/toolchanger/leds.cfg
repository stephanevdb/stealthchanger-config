#####################################################################
#   StealthBurner LED Status Macros
#####################################################################
# Macros for setting the status leds on the toolhead (or any neopixel-type LEDs).
# Contributed by Voron discord users wile.e, Tetsunosuke, and etherwalker
#
# Available status macros:
#   STATUS_READY           STATUS_OFF             STATUS_BUSY
#   STATUS_HEATING         STATUS_LEVELING        STATUS_HOMING
#   STATUS_CLEANING        STATUS_MESHING         STATUS_CALIBRATING_Z
#   STATUS_PRINTING
#
# Control macros:
#   SET_NOZZLE_LEDS_ON     SET_LOGO_LEDS_OFF      SET_NOZZLE_LEDS_OFF
#
# Setup:
#   1. Define [neopixel Tn_leds] in each toolhead config (see TH00.cfg example)
#   2. Add STATUS_xxx calls to your macros (e.g. STATUS_LEVELING in QGL macro)


#####################################################################
#   LED Color Definitions
#####################################################################

[gcode_macro _toolchanger_led_vars]
variable_colors: {
        'logo': {
            'busy': {'r': 0.4, 'g': 0.0, 'b': 0.0, 'w': 0.0},
            'cleaning': {'r': 0.0, 'g': 0.02, 'b': 0.5, 'w': 0.0},
            'calibrating_z': {'r': 0.8, 'g': 0., 'b': 0.35, 'w': 0.0},
            'heating': {'r': 0.3, 'g': 0.18, 'b': 0.0, 'w': 0.0},
            'homing': {'r': 0.0, 'g': 0.6, 'b': 0.2, 'w': 0.0},
            'leveling': {'r': 0.5, 'g': 0.1, 'b': 0.4, 'w': 0.0},
            'meshing': {'r': 0.2, 'g': 1.0, 'b': 0.0, 'w': 0.0},
            'off': {'r': 0.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},
            'printing': {'r': 1.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},
            'standby': {'r': 0.01, 'g': 0.01, 'b': 0.01, 'w': 0.1},
        },
        'nozzle': {
            'heating': {'r': 0.8, 'g': 0.35, 'b': 0.0, 'w':0.0},
            'off': {'r': 0.0, 'g': 0.0, 'b': 0.0, 'w': 0.0},
            'on': {'r': 0.8, 'g': 0.8, 'b': 0.8, 'w':1.0},
            'standby': {'r': 0.6, 'g': 0.0, 'b': 0.0, 'w':0.0},
