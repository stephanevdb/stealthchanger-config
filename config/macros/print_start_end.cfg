#####################################################################
#   PRINT_START / PRINT_END
#####################################################################


[gcode_macro PRINT_START]
gcode:
  {% set TOOL_TEMP = params.TOOL_TEMP|default(150)|float %}
  {% set BED_TEMP = params.BED_TEMP|default(0)|float %}
  {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float  - 10 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set cur_z = printer.toolhead.position.z|float %}
  {% if (cur_z + 15) <= max_z %}
    {% set safe_z = cur_z + 15 %}
  {% else %}
    {% set safe_z = max_z %}
  {% endif %}

  SET_LED LED=daylight GREEN=1 RED=1 BLUE=1
  M117 Initializing...
  INITIALIZE_TOOLCHANGER
  STOP_TOOL_PROBE_CRASH_DETECTION
  CLEAR_PAUSE

  _TOOLCHANGER_PRINT_START_START

  # Home
  SET_DISPLAY_TEXT MSG="Homing"
  G28
  G1 X20 Y330 Z{safe_z} F20000

  # Heat bed
  SET_DISPLAY_TEXT MSG="Heating bed: { BED_TEMP }"
  M190 S{ BED_TEMP }

  # Heat nozzle to probe temp & clean
  SET_DISPLAY_TEXT MSG="Heating nozzle to probe temp"
  M109 S150
  _TOOLCHANGER_CLEAN_NOZZLE

  # Quad Gantry Level
  SET_DISPLAY_TEXT MSG="QGL"
  G0 Z 10
  quad_gantry_level

  # Bed Mesh
  SET_DISPLAY_TEXT MSG="Bed mesh"
  G28 Z
  BED_MESH_CALIBRATE
  BED_MESH_PROFILE LOAD=default
  M109 S0
  G1 X20 Y330 Z{safe_z} F20000

  # Preheat all hotends in use
  {% for tool_nr in printer.toolchanger.tool_numbers %}
    {% set tooltemp_param = 'T' ~ tool_nr|string ~ '_TEMP' %}
    {% if tooltemp_param in params %}
      M104 T{tool_nr} S{params[tooltemp_param]}
    {% endif %}
  {% endfor %}

  # Select starting tool
  {% if params.TOOL is defined %}
    T{params.TOOL}
  {% endif %}

  # Heat to print temp & final clean
  SET_DISPLAY_TEXT MSG="Heating hotend: { TOOL_TEMP }"
  G90
  G92 E0
  M106 S100
  G0 Z10 F3000
  G1 X20 Y330 Z{safe_z} F20000
  M109 S{ TOOL_TEMP }
  _TOOLCHANGER_CLEAN_NOZZLE

  _TOOLCHANGER_PRINT_START_END

  # Purge and go
  SET_DISPLAY_TEXT MSG="Purging"
  LINE_PURGE
  SET_DISPLAY_TEXT MSG="Printing"


[gcode_macro PRINT_END]
gcode:
  {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float  - 10 %}
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set cur_z = printer.toolhead.position.z|float %}
  {% if (cur_z + 15) <= max_z %}
    {% set safe_z = cur_z + 15 %}
  {% else %}
    {% set safe_z = max_z %}
  {% endif %}

  _TOOLCHANGER_PRINT_END_START
  STOP_TOOL_PROBE_CRASH_DETECTION
  M400
  CLEAR_PAUSE

  M220 S100
  M221 S100
  SET_PRESSURE_ADVANCE ADVANCE=0

  {% if printer.extruder.temperature >= 170 %}
    M83
    G91
    G1 E-2 F2400
    G1 E-2 Z5 F2400
  {% endif %}

  T0
  M82
  G90

  SET_GCODE_OFFSET X=0.0 Y=0.0 Z=0.0
  G1 X0 Y{max_y} Z{safe_z} F30000
  BED_MESH_CLEAR

  TURN_OFF_HEATERS
  _TOOLCHANGER_TURN_OFF_FANS
  M140 S0

  _TOOLCHANGER_PRINT_END_END
  M117 Print done
  SET_LED LED=daylight GREEN=1 RED=0 BLUE=0
