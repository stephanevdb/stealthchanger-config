#####################################################################
#   Toolhead 1 (T1) - EBB36 CAN Bus
#####################################################################


#####################################################################
#   MCU
#####################################################################

[mcu EBB_TH01]
canbus_uuid: 0544d7b450c7


#####################################################################
#   Extruder
#####################################################################

[extruder1]
step_pin: EBB_TH01: PD0
dir_pin: EBB_TH01: PD1
enable_pin: !EBB_TH01: PD2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.637
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_cross_section: 10
max_extrude_only_distance: 150
heater_pin: EBB_TH01: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBB_TH01: PA3
control: pid
pid_Kp: 24.407
pid_Ki: 2.199
pid_Kd: 67.730
min_temp: 0
max_temp: 290

[tmc2209 extruder1]
uart_pin: EBB_TH01: PA15
run_current: 0.650
stealthchop_threshold: 999999


#####################################################################
#   Fans
#####################################################################

[fan_generic TH01_partfan]
pin: EBB_TH01: PA1

[heater_fan TH01_hotend_fan]
pin: EBB_TH01: PA0
heater: extruder1
heater_temp: 50.0


#####################################################################
#   Tool Definition
#####################################################################

[tool TH01]
tool_number: 1
extruder: extruder1
fan: fan_generic TH01_partfan
gcode_x_offset: -0.3
gcode_y_offset: 0.3
gcode_z_offset: 0.02
params_park_x: 337.5
params_park_y: 1.0
params_park_z: 338.0
params_close_y: 30.0
params_safe_y: 120.0
params_input_shaper_freq_x: 102.4
params_input_shaper_type_x: 'zv'
params_input_shaper_freq_y: 20.6
params_input_shaper_type_y: 'zv'


#####################################################################
#   Probe (Tap)
#####################################################################

[tool_probe T1]
pin: ^EBB_TH01: PB9
tool: 1
z_offset: 0
speed: 10
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.02
samples_tolerance_retries: 3
activate_gcode:
  _TAP_PROBE_ACTIVATE HEATER=extruder1 TEMP=150


#####################################################################
#   Accelerometer
#####################################################################

[adxl345 TH01]
cs_pin: EBB_TH01: PB12
spi_software_sclk_pin: EBB_TH01: PB10
spi_software_mosi_pin: EBB_TH01: PB11
spi_software_miso_pin: EBB_TH01: PB2
axes_map: x,y,z


#####################################################################
#   Filament Sensor
#####################################################################

[filament_switch_sensor filament_sensor_TH01]
switch_pin: !EBB_TH01: PB4
pause_on_runout: FALSE
runout_gcode:
  M117 Runout sensor TH01 reports: Runout
  SET_GCODE_VARIABLE MACRO=TH01 VARIABLE=filament_consumed VALUE=1
insert_gcode:
  M117 Runout sensor TH01 reports: Filament Detected
  SET_GCODE_VARIABLE MACRO=TH01 VARIABLE=filament_consumed VALUE=0


#####################################################################
#   Tool Selection Macros
#####################################################################

[gcode_macro TH01]
variable_active: 0
variable_filament_consumed: 0
gcode:
  {% if printer.toolhead.homed_axes != "xyz" %}
    {action_respond_info("Please home XYZ first")}
  {% else %}
    _TOOLCHANGER_DISABLE_FILAMENT_SENSORS
    SET_GCODE_VARIABLE MACRO=TH01 VARIABLE=active VALUE=1
    ACTIVATE_EXTRUDER EXTRUDER=extruder1
    SELECT_TOOL T=1
  {% endif %}

[gcode_macro T1]
variable_realtool: "TH01"
variable_backuptool: ""
variable_color: ""
variable_spool_id: None
gcode:
  SET_ACTIVE_SPOOL ID={ printer['gcode_macro T1'].spool_id }
  {% set consumed = printer["gcode_macro " ~ realtool].filament_consumed|int %}
  {% if consumed and backuptool %}
    { action_respond_info(realtool ~ " empty loading backup") }
    {backuptool}
  {% else %}
    { action_respond_info("Switching to " ~ realtool) }
    {realtool}
  {% endif %}
